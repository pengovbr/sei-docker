services:
  jod:
    image: ${DOCKER_REGISTRY}/${JOD_IMAGE}:${ENVIRONMENT_VERSION}
    container_name: jod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8100 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  smtp:
    image: ${DOCKER_REGISTRY}/mailcatcher:${ENVIRONMENT_VERSION}
    container_name: smtp
    restart: unless-stopped
    ports:
      - "1080:1080"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1025 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  memcached:
    image: ${DOCKER_REGISTRY}/memcached:${ENVIRONMENT_VERSION}
    container_name: memcached
    restart: unless-stopped
    ports:
      - "11211:11211"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11211' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  database:
    image: ${DOCKER_REGISTRY}/${DATABASE_IMAGE}:${ENVIRONMENT_VERSION}
    container_name: ${DATABASE_HOST}
    restart: always
    volumes:
      - ${DATABASE_HOST}:${DATABASE_DATA_DIR}
    ports:
      - ${DATABASE_PORT}:${DATABASE_PORT}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/${DATABASE_PORT}' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  solr:
    image: ${DOCKER_REGISTRY}/${SOLR_IMAGE}:${ENVIRONMENT_VERSION}
    container_name: solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  httpd:
    image: ${DOCKER_REGISTRY}/${APP_IMAGE}:${ENVIRONMENT_VERSION}
    container_name: httpd
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
      memcached:
        condition: service_healthy
      solr:
        condition: service_healthy
      smtp:
        condition: service_started
      jod:
        condition: service_started
    #command: "tail -f /dev/null"
    volumes:
      - ${SEI_PATH}:/opt/
    environment:
      - XDEBUG_CONFIG="idekey=default client_host=${HOST_IP} client_port=9003 discover_client_host=1"
      - XDEBUG_SESSION=default
      - XDEBUG_MODE=debug
      - HOST_URL=http://localhost:8000
      - DATABASE_TYPE=${DATABASE_TYPE}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}

      - SEI_CHAVE_ACESSO=${SEI_CHAVE_ACESSO}
      - SEI_DATABASE_NAME=${SEI_DATABASE_NAME}
      - SEI_DATABASE_USER=${SEI_DATABASE_USER}
      - SEI_DATABASE_PASSWORD=${SEI_DATABASE_PASSWORD}
      - SEI_DATABASE_USER_SCRIPT=${SEI_DATABASE_USER_SCRIPT}
      - SEI_DATABASE_PASSWORD_SCRIPT=${SEI_DATABASE_PASSWORD_SCRIPT}

      - SIP_CHAVE_ACESSO=${SIP_CHAVE_ACESSO}
      - SIP_DATABASE_NAME=${SIP_DATABASE_NAME}
      - SIP_DATABASE_USER=${SIP_DATABASE_USER}
      - SIP_DATABASE_PASSWORD=${SIP_DATABASE_PASSWORD}
      - SIP_DATABASE_USER_SCRIPT=${SIP_DATABASE_USER_SCRIPT}
      - SIP_DATABASE_PASSWORD_SCRIPT=${SIP_DATABASE_PASSWORD_SCRIPT}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/sei/ || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

volumes:
  mysql:
  oracle:
  sqlserver:
  postgres:
